name: Build and Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.1.15)'
        required: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_BUILDER_SKIP_POSTINSTALL: ''

      - name: Build Windows installer and portable
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
