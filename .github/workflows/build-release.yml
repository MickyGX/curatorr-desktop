name: Build and Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.1.15)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Verify better-sqlite3 binary exists
        run: |
          $binary = Get-ChildItem -Path "curatorr\node_modules\better-sqlite3" -Recurse -Filter "*.node" | Select-Object -First 1
          if (-not $binary) {
            Write-Error "better-sqlite3 native binary not found — setup.mjs may have failed"
            exit 1
          }
          Write-Host "Found binary: $($binary.FullName)"
        shell: pwsh

      - name: Build Windows installer and portable
        run: npm run dist -- --publish never
        env:
          ELECTRON_BUILDER_SKIP_POSTINSTALL: '1'

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
